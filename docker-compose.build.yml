services:
  backend:
    image: fundamental-terminal/backend:local
    pull_policy: never
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-postgresql+psycopg://fundamental:fundamental@host.docker.internal:5432/fundamentals}
      REDIS_URL: ${REDIS_URL_OVERRIDE:-redis://host.docker.internal:6379/0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"

  data-fetcher:
    image: fundamental-terminal/backend:local
    pull_policy: never
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-postgresql+psycopg://fundamental:fundamental@host.docker.internal:5432/fundamentals}
      REDIS_URL: ${REDIS_URL_OVERRIDE:-redis://host.docker.internal:6379/0}

  sp500-prewarm:
    image: fundamental-terminal/backend:local
    pull_policy: never
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-postgresql+psycopg://fundamental:fundamental@host.docker.internal:5432/fundamentals}
      REDIS_URL: ${REDIS_URL_OVERRIDE:-redis://host.docker.internal:6379/0}

  frontend:
    image: fundamental-terminal/frontend:local
    pull_policy: never
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-http://backend:8000}
    environment:
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-http://backend:8000}
      PORT: 3000
    ports:
      - "3000:3000"