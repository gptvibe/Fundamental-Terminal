services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fundamentals}
      POSTGRES_USER: ${POSTGRES_USER:-fundamental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fundamental} -d ${POSTGRES_DB:-fundamentals}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    image: fundamental-terminal/backend:local
    pull_policy: never
    init: true
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-${DATABASE_URL:?DATABASE_URL must be set}}
      REDIS_URL: ${REDIS_URL_OVERRIDE:-redis://redis:6379/0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      FRED_API_KEY: ${FRED_API_KEY:-}
      HOT_RESPONSE_CACHE_TTL_SECONDS: ${HOT_RESPONSE_CACHE_TTL_SECONDS:-120}
      HOT_RESPONSE_CACHE_STALE_TTL_SECONDS: ${HOT_RESPONSE_CACHE_STALE_TTL_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    ports:
      - "8000:8000"

  data-fetcher:
    image: fundamental-terminal/backend:local
    pull_policy: never
    init: true
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-${DATABASE_URL:?DATABASE_URL must be set}}
      REDIS_URL: ${REDIS_URL_OVERRIDE:-redis://redis:6379/0}
      FRED_API_KEY: ${FRED_API_KEY:-}
    healthcheck:
      test: ["CMD", "/bin/sh", "/app/docker/backend/healthcheck-data-fetcher.sh"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy

  sp500-prewarm:
    image: fundamental-terminal/backend:local
    pull_policy: never
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL_OVERRIDE:-${DATABASE_URL:?DATABASE_URL must be set}}
      REDIS_URL: ${REDIS_URL_OVERRIDE:-redis://redis:6379/0}
      FRED_API_KEY: ${FRED_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    image: fundamental-terminal/frontend:local
    pull_policy: never
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-http://backend:8000}
    environment:
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-http://backend:8000}
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/', { signal: AbortSignal.timeout(5000) }).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    ports:
      - "3000:3000"

volumes:
  postgres_data:
