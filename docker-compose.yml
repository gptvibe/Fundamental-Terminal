services:
  postgres:
    image: postgres:16-alpine
    container_name: fundamental-terminal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fundamentals}
      POSTGRES_USER: ${POSTGRES_USER:-fundamental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fundamental} -d ${POSTGRES_DB:-fundamentals}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - fundamental-terminal-net

  redis:
    image: redis:7-alpine
    container_name: fundamental-terminal-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - fundamental-terminal-net

  backend:
    image: ${BACKEND_IMAGE:-gptvibe/fundamentalterminal:backend-latest}
    container_name: fundamental-terminal-backend
    pull_policy: always
    init: true
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      FRED_API_KEY: ${FRED_API_KEY:-}
      FRESHNESS_WINDOW_HOURS: ${FRESHNESS_WINDOW_HOURS:-24}
      SEC_TIMEOUT_SECONDS: ${SEC_TIMEOUT_SECONDS:-30}
      SEC_MIN_REQUEST_INTERVAL_SECONDS: ${SEC_MIN_REQUEST_INTERVAL_SECONDS:-0.2}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      HOT_RESPONSE_CACHE_TTL_SECONDS: ${HOT_RESPONSE_CACHE_TTL_SECONDS:-120}
      HOT_RESPONSE_CACHE_STALE_TTL_SECONDS: ${HOT_RESPONSE_CACHE_STALE_TTL_SECONDS:-900}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - fundamental-terminal-net

  data-fetcher:
    image: ${BACKEND_IMAGE:-gptvibe/fundamentalterminal:backend-latest}
    container_name: fundamental-terminal-data-fetcher
    pull_policy: always
    init: true
    restart: unless-stopped
    command: ["/bin/sh", "/app/docker/backend/start-worker.sh"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRED_API_KEY: ${FRED_API_KEY:-}
      WORKER_IDENTIFIERS: ${WORKER_IDENTIFIERS:-AAPL MSFT NVDA AMZN}
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-3600}
      FRESHNESS_WINDOW_HOURS: ${FRESHNESS_WINDOW_HOURS:-24}
      SEC_TIMEOUT_SECONDS: ${SEC_TIMEOUT_SECONDS:-30}
      SEC_MIN_REQUEST_INTERVAL_SECONDS: ${SEC_MIN_REQUEST_INTERVAL_SECONDS:-0.2}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      REFRESH_QUEUE_POLL_SECONDS: ${REFRESH_QUEUE_POLL_SECONDS:-5}
      DATA_FETCHER_ENABLED: ${DATA_FETCHER_ENABLED:-true}
      DATA_FETCHER_STARTUP_DELAY_SECONDS: ${DATA_FETCHER_STARTUP_DELAY_SECONDS:-45}
      DATA_FETCHER_ENQUEUE_ON_STARTUP: ${DATA_FETCHER_ENQUEUE_ON_STARTUP:-false}
      DATA_FETCHER_RUN_MACRO_WORKER: ${DATA_FETCHER_RUN_MACRO_WORKER:-true}
      DATA_FETCHER_HEALTH_HEARTBEAT_FILE: ${DATA_FETCHER_HEALTH_HEARTBEAT_FILE:-/tmp/data-fetcher-worker-heartbeat}
      DATA_FETCHER_HEALTH_QUEUE_PID_FILE: ${DATA_FETCHER_HEALTH_QUEUE_PID_FILE:-/tmp/data-fetcher-queue.pid}
      DATA_FETCHER_HEALTH_MAX_STALE_SECONDS: ${DATA_FETCHER_HEALTH_MAX_STALE_SECONDS:-75}
    healthcheck:
      test: ["CMD-SHELL", "/bin/sh /app/docker/backend/healthcheck-data-fetcher.sh"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 45s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fundamental-terminal-net

  sp500-prewarm:
    image: ${BACKEND_IMAGE:-gptvibe/fundamentalterminal:backend-latest}
    container_name: fundamental-terminal-sp500-prewarm
    pull_policy: always
    command: ["/bin/sh", "/app/docker/backend/start-prewarm.sh"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FRED_API_KEY: ${FRED_API_KEY:-}
      FRESHNESS_WINDOW_HOURS: ${FRESHNESS_WINDOW_HOURS:-24}
      SEC_TIMEOUT_SECONDS: ${SEC_TIMEOUT_SECONDS:-30}
      SEC_MIN_REQUEST_INTERVAL_SECONDS: ${SEC_MIN_REQUEST_INTERVAL_SECONDS:-0.2}
      SP500_PREWARM_MODE: ${SP500_PREWARM_MODE:-refresh}
      SP500_PREWARM_FORCE: ${SP500_PREWARM_FORCE:-false}
      SP500_CONSTITUENTS_FILE: ${SP500_CONSTITUENTS_FILE:-/app/app/data/sp500_tickers.txt}
      SP500_PREWARM_LIMIT: ${SP500_PREWARM_LIMIT:-}
      SP500_PREWARM_START_AT: ${SP500_PREWARM_START_AT:-}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - prewarm
    networks:
      - fundamental-terminal-net

  frontend:
    image: ${FRONTEND_IMAGE:-gptvibe/fundamentalterminal:frontend-latest}
    container_name: fundamental-terminal-frontend
    pull_policy: always
    restart: unless-stopped
    environment:
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-http://backend:8000}
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - fundamental-terminal-net

volumes:
  postgres_data:

networks:
  fundamental-terminal-net:
    driver: bridge
