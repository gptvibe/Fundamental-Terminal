name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-architecture:
    name: Backend Architecture
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run architecture boundary guard
        run: python scripts/check_architecture_boundaries.py

      - name: Run targeted backend regression tests
        run: >-
          pytest
          tests/test_architecture_boundaries.py
          tests/test_sec_edgar_refresh_orchestrator.py
          tests/test_fetch_trigger_dedupe.py
          tests/test_api_route_inventory.py

  frontend-route-compatibility:
    name: Frontend Route Compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend route stability tests
        working-directory: frontend
        run: npm run test -- lib/api.routes.test.ts