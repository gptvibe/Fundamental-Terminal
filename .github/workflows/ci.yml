name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-architecture:
    name: Backend Architecture
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run migration safety checks
        run: python scripts/check_migration_safety.py

      - name: Run architecture boundary guard
        run: python scripts/check_architecture_boundaries.py

      - name: Run targeted backend regression tests
        run: >-
          pytest
          tests/test_architecture_boundaries.py
          tests/test_sec_edgar_refresh_orchestrator.py
          tests/test_fetch_trigger_dedupe.py
          tests/test_api_route_inventory.py
          tests/test_deployment_release_lock.py
          tests/test_model_evaluation_harness.py
          tests/test_benchmark_infrastructure.py
          tests/test_hot_endpoint_contracts.py

  performance-regression-gate:
    name: Performance Regression Gate
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run backend performance regression gate
        run: >-
          python scripts/run_performance_regression_gate.py
          --baseline-file scripts/performance_regression_baseline.json
          --fail-on-regression
          --json-out artifacts/performance/backend-performance-summary.json
          --markdown-out artifacts/performance/backend-performance-summary.md

      - name: Upload backend benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-performance-benchmarks
          path: artifacts/performance/
          if-no-files-found: error

  frontend-route-compatibility:
    name: Frontend Route Compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend route stability tests
        working-directory: frontend
        run: npm run test -- lib/api.routes.test.ts lib/api.auth.test.ts next.config.test.ts app/company/[ticker]/models/page.test.ts

  model-evaluation-gate:
    name: Model Evaluation Gate
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/fundamental_terminal
      SEC_USER_AGENT: FundamentalTerminalCI/1.0 (ci@example.com)

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fundamental_terminal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fundamental_terminal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run model evaluation gate
        run: >-
          python scripts/run_model_evaluation.py
          --fixture historical_fixture_v1
          --baseline-file scripts/model_evaluation_baseline.json
          --fail-on-delta
          --persist
