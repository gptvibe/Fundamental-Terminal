name: Publish Docker Hub images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        shell: bash
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "Missing Docker Hub credentials. Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract backend image metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: gptvibe/fundamentalterminal
          tags: |
            type=ref,event=tag,prefix=backend-
            type=raw,value=backend-latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

  frontend:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        shell: bash
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "Missing Docker Hub credentials. Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: gptvibe/fundamentalterminal
          tags: |
            type=ref,event=tag,prefix=frontend-
            type=raw,value=frontend-latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            BACKEND_API_BASE_URL=http://backend:8000
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}

  verify-compatibility:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve published image tags
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "BACKEND_IMAGE=gptvibe/fundamentalterminal:backend-${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "FRONTEND_IMAGE=gptvibe/fundamentalterminal:frontend-${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "BACKEND_IMAGE=gptvibe/fundamentalterminal:backend-latest" >> "$GITHUB_ENV"
            echo "FRONTEND_IMAGE=gptvibe/fundamentalterminal:frontend-latest" >> "$GITHUB_ENV"
          fi

      - name: Pull published images
        run: |
          docker pull "$BACKEND_IMAGE"
          docker pull "$FRONTEND_IMAGE"

      - name: Start verification stack
        shell: bash
        run: |
          docker network create ft-release-verify
          docker run -d --name ft-verify-postgres --network ft-release-verify \
            -e POSTGRES_DB=fundamentals \
            -e POSTGRES_USER=fundamental \
            -e POSTGRES_PASSWORD=fundamental \
            --health-cmd "pg_isready -U fundamental -d fundamentals" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 12 \
            postgres:16-alpine
          docker run -d --name ft-verify-redis --network ft-release-verify \
            --health-cmd "redis-cli ping" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 12 \
            redis:7-alpine redis-server --save "" --appendonly no

          for container in ft-verify-postgres ft-verify-redis; do
            for _ in $(seq 1 30); do
              health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container")"
              if [[ "$health" == "healthy" ]]; then
                break
              fi
              sleep 2
            done

            health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container")"
            if [[ "$health" != "healthy" ]]; then
              echo "::error::$container failed to become healthy (status=$health)"
              docker logs "$container" || true
              exit 1
            fi
          done

          docker run -d --name ft-verify-backend --network ft-release-verify \
            -p 8000:8000 \
            -e DATABASE_URL=postgresql+psycopg://fundamental:fundamental@ft-verify-postgres:5432/fundamentals \
            -e REDIS_URL=redis://ft-verify-redis:6379/0 \
            -e SEC_USER_AGENT="FundamentalTerminalCI/1.0 (ci@example.com)" \
            -e API_HOST=0.0.0.0 \
            -e API_PORT=8000 \
            "$BACKEND_IMAGE"
          docker run -d --name ft-verify-frontend --network ft-release-verify \
            -p 3000:3000 \
            -e BACKEND_API_BASE_URL=http://ft-verify-backend:8000 \
            -e PORT=3000 \
            "$FRONTEND_IMAGE"

      - name: Verify deployed compatibility
        run: python scripts/verify_deployment_compat.py --backend-url http://127.0.0.1:8000 --frontend-url http://127.0.0.1:3000 --ticker AAPL --wait-timeout 240

      - name: Dump verification container logs on failure
        if: failure()
        shell: bash
        run: |
          for container in ft-verify-postgres ft-verify-redis ft-verify-backend ft-verify-frontend; do
            echo "===== ${container} ====="
            docker logs "$container" 2>&1 || true
          done

      - name: Tear down verification stack
        if: always()
        shell: bash
        run: |
          docker rm -f ft-verify-frontend ft-verify-backend ft-verify-redis ft-verify-postgres >/dev/null 2>&1 || true
          docker network rm ft-release-verify >/dev/null 2>&1 || true
